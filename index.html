<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tres Katanas - Inicio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
    <div id="navbar"></div>

    <main class="container-fluid fondo-principal">
        <section class="container text-center py-5">
            <h1 class="titulo-principal">Bienvenido a Tres Katanas</h1>
            <p class="subtitulo-principal">Tu tienda de productos importados: tecnologia, perfumes arabes y vapers.</p>
        </section>

        <section class="carousel-inicio mb-5">
            <div id="carouselTresKatanas" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner">
                    <div class="carousel-item active" data-bs-interval="3000">
                        <img src="./img/fondos/Perfumesportada.png" class="d-block w-100" alt="Perfumes Arabes">
                    </div>

                    <div class="carousel-item" data-bs-interval="3000">
                        <img src="./img/fondos/vapersportada.png" class="d-block w-100" alt="Vapers">
                    </div>

                    <div class="carousel-item" data-bs-interval="3000">
                        <img src="./img/fondos/tecnologiaportada.png" class="d-block w-100" alt="Tecnologia">
                    </div>
                </div>

                <button class="carousel-control-prev" type="button" data-bs-target="#carouselTresKatanas" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>

                <button class="carousel-control-next" type="button" data-bs-target="#carouselTresKatanas" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>
        </section>

        <section class="container pb-5">
            <h2 class="text-center titulo-seccion mb-4">Productos Destacados</h2>
            <div class="row justify-content-center g-4" id="productos" data-categoria="destacados"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/datos.js"></script>
    <script src="js/titulo.js"></script>
    <script src="js/auth.js"></script>
    <script src="componentes/navbar.js"></script>
    <script src="componentes/cards.js"></script>
    <script src="js/catalogo.js"></script>
</body>
</html>
