<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tres Katanas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-dark border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">🗡️ Tres Katanas</a>
        </div>
    </nav>

    <main class="container-fluid fondo-principal d-flex justify-content-center align-items-center" style="min-height:90vh;">

        <div class="card card-producto p-4" style="width: 28rem;">
            <h2 class="text-center titulo-seccion mb-4">Iniciar Sesión</h2>

            <form>
                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control" placeholder="Ingrese su email">
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control" placeholder="Ingrese su contraseña">
                </div>

                <button type="submit" class="btn btn-katana w-100">Ingresar</button>
            </form>
        </div>

    </main>

</body>
</html>
