<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tres Katanas - Registro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-dark border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">Tres Katanas</a>
        </div>
    </nav>

    <main class="container-fluid fondo-principal d-flex justify-content-center align-items-center" style="min-height:90vh;">
        <div class="card card-producto p-4" style="width: 32rem;">
            <h2 class="text-center titulo-seccion mb-4">Registro de Usuario</h2>

            <form>
                <div class="mb-3">
                    <label class="form-label" for="nombre">Nombre</label>
                    <input type="text" class="form-control" id="nombre" placeholder="Ingrese su nombre">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="apellido">Apellido</label>
                    <input type="text" class="form-control" id="apellido" placeholder="Ingrese su apellido">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="registro-email">Correo electronico</label>
                    <input type="email" class="form-control" id="registro-email" placeholder="Ingrese su email">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="registro-password">Contrasena</label>
                    <input type="password" class="form-control" id="registro-password" placeholder="Ingrese una contrasena">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="fecha-nacimiento">Fecha de nacimiento</label>
                    <input type="date" class="form-control" id="fecha-nacimiento">
                </div>

                <button type="submit" class="btn btn-katana w-100">Registrarse</button>
            </form>
        </div>
    </main>

    <script src="../js/datos.js"></script>
    <script src="../js/titulo.js"></script>
</body>
</html>
